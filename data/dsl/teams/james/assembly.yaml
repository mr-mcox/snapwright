# ---------------------------------------------------------------------------
# Personal mixer (P16) — A.33-A.48
# Slot label → [musicians]. Tap points and slot positions in infrastructure.yaml.
# Omit a label to leave that slot OFF.
# ---------------------------------------------------------------------------
personal_mixer:
  Bass:       [bass]
  Drum Set:   [kick, snare, tom, overhead]
  Lead 1:     [priscilla-vox]
  Lead 2:     [james-vox]
  Back Vox:   [anna-vox, yolaine-vox]
  Piano:      [piano]
  Guitars:    [james-guitar, violin]
  Other Inst: [flute]
  Wireless:   [handheld, headset]
